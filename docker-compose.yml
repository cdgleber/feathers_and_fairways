services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: feathers_and_fairways
    ports:
      - "41549:41549"
    environment:
      - DATABASE_URL=sqlite:/app/data/feathers_and_fairways.db
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
      - HOST=0.0.0.0
      - PORT=3000
      - RUST_LOG=feathers_and_fairways=info,tower_http=info
    volumes:
      - ./data:/app/data
    restart: unless-stopped
